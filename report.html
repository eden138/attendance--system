<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reports - Adama City HR System</title>

<link rel="stylesheet" href="css/report.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

</head>


<body>


<div class="sidebar">

<h2>Adama City</h2>
<p>HR System</p>


<ul>

<li onclick="goDashboard()">
<i class="fa fa-home"></i>
Dashboard
</li>


<li onclick="goAttendance()">
<i class="fa fa-calendar-check"></i>
Attendance
</li>


<li onclick="goEmployees()">
<i class="fa fa-users"></i>
Employees
</li>


<li class="active">
<i class="fa fa-file"></i>
Reports
</li>


<li>
<i class="fa fa-cog"></i>
Settings
</li>


<li onclick="logout()">
<i class="fa fa-sign-out"></i>
Logout
</li>


</ul>

</div>




<div class="main">


<div class="topbar">

<h2>
Attendance Reports
</h2>


<button>
<i class="fa fa-download"></i>
Export Report
</button>


</div>




<div class="filters">


<select>

<option>
Daily Report
</option>

<option>
Weekly Report
</option>

<option>
Monthly Report
</option>

</select>



<input type="date">


<button class="search">

<i class="fa fa-search"></i>
Search

</button>


</div>




<div class="summary">


<div class="box">

<h3>500</h3>

<p>Total Employees</p>

</div>



<div class="box green">

<h3>420</h3>

<p>Present</p>

</div>



<div class="box red">

<h3>50</h3>

<p>Absent</p>

</div>



<div class="box orange">

<h3>30</h3>

<p>Late</p>

</div>


</div>




<div class="table-box">


<h2>
Attendance Report
</h2>


<table>


<tr>

<th>ID</th>
<th>Name</th>
<th>Department</th>
<th>Date</th>
<th>Time</th>
<th>Status</th>

</tr>



<tr>

<td>001</td>
<td>Abebe Kebede</td>
<td>IT</td>
<td>07/07/2026</td>
<td>08:10 AM</td>
<td class="present">
Present
</td>

</tr>



</table>


</div>



</div>



<script src="js/report.js"></script>


</body>

</html>
